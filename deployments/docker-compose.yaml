name: pai_smart

services:
  mysql:
    image: mysql:8.4.8
    container_name: paismart-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: PaiSmart2025
      MYSQL_DATABASE: PaiSmart
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --explicit_defaults_for_timestamp=true
      - --lower_case_table_names=1
    volumes:
      - mysql-data:/var/lib/mysql
      - ../docs/ddl.sql:/docker-entrypoint-initdb.d/001-ddl.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pPaiSmart2025"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: paismart-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --bind 0.0.0.0 --port 6379 --requirepass PaiSmart2025 --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "PaiSmart2025", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: paismart-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Shanghai
      NO_PROXY: localhost,127.0.0.1,minio,backend,mysql,redis,es,kafka,zookeeper,tika
      no_proxy: localhost,127.0.0.1,minio,backend,mysql,redis,es,kafka,zookeeper,tika
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: paismart-minio-init
    depends_on:
      - minio
    environment:
      NO_PROXY: localhost,127.0.0.1,minio,backend,mysql,redis,es,kafka,zookeeper,tika
      no_proxy: localhost,127.0.0.1,minio,backend,mysql,redis,es,kafka,zookeeper,tika
    entrypoint: >
      sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/uploads || true
      "
    restart: "no"

  tika:
    image: apache/tika:2.9.2.1-full
    container_name: paismart-tika
    restart: unless-stopped
    ports:
      - "9998:9998"
    environment:
      NO_PROXY: localhost,127.0.0.1,minio,backend,mysql,redis,es,kafka,zookeeper,tika
      no_proxy: localhost,127.0.0.1,minio,backend,mysql,redis,es,kafka,zookeeper,tika

  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.1
    container_name: paismart-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    container_name: paismart-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.2.1
    container_name: paismart-kafka-init
    depends_on:
      - kafka
    entrypoint: >
      sh -c "
      sleep 8;
      kafka-topics --create --if-not-exists --topic file-processing --bootstrap-server kafka:29092 || true;
      kafka-topics --create --if-not-exists --topic vectorization --bootstrap-server kafka:29092 || true;
      "
    restart: "no"

  es:
    image: elasticsearch:8.10.4
    container_name: paismart-es
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      node.name: paismart-es01
      discovery.type: single-node
      xpack.license.self_generated.type: basic
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      cluster.name: paismart-es-cluster
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      NO_PROXY: localhost,127.0.0.1,minio,backend,mysql,redis,es,kafka,zookeeper,tika
      no_proxy: localhost,127.0.0.1,minio,backend,mysql,redis,es,kafka,zookeeper,tika
    volumes:
      - es-data:/usr/share/elasticsearch/data
  backend:
    container_name: paismart-backend
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      es:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      tika:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      TZ: Asia/Shanghai
      NO_PROXY: localhost,127.0.0.1,minio,backend,mysql,redis,es,kafka,zookeeper,tika
      no_proxy: localhost,127.0.0.1,minio,backend,mysql,redis,es,kafka,zookeeper,tika
      # Jina Rerank API（可在 .env 或 shell 中注入）
      JINA_API_KEY: ${JINA_API_KEY:-}
      JINA_RERANK_MODEL: ${JINA_RERANK_MODEL:-jina-reranker-v2-base-multilingual}
    volumes:
      - ../deployments/config.docker.yaml:/app/configs/config.yaml:ro
      - ../logs:/app/logs
      - ../initfile:/app/initfile:ro

volumes:
  mysql-data:
  redis-data:
  minio-data:
  kafka-data:
  es-data:

networks:
  default:
    name: paismart-go-network
